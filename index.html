<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacky's Library</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="header-left">
            <a href="https://youtube.com" target="_blank" class="social-icon"><i class="fab fa-youtube"></i></a>
            <a href="https://discord.com" target="_blank" class="social-icon"><i class="fab fa-discord"></i></a>
        </div>
        <div class="header-center">
            <h1>JACKY'S LIBRARY</h1>
            <p class="subtitle">Made by jacky's_fixes</p>
        </div>
        <div class="header-right">
            <button id="exportBtn" class="btn-export"><i class="fas fa-file-export"></i> Export List</button>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchBar" placeholder="Search games...">
            </div>
            <button id="addLinkBtn" class="btn-add hidden"><i class="fas fa-plus"></i> New Link</button>
        </div>
    </header>

    <main class="container">
        <div id="gamesGrid" class="games-grid">
            </div>
    </main>

    <div id="publishModal" class="modal">
        <div class="modal-content">
            <h2>Publish New Game</h2>
            <input type="text" id="newGameName" placeholder="Game Name">
            <input type="text" id="newDownloadLink" placeholder="Download Link">
            <input type="text" id="newYoutubeLink" placeholder="YouTube Preview Link">
            
            <div id="dropZone" class="drop-zone">
                <span class="drop-zone__prompt"><i class="fas fa-cloud-upload-alt" style="font-size: 20px; display: block; margin-bottom: 5px;"></i>Drag & drop thumbnail or click to browse</span>
                <input type="file" id="newThumbnailFile" class="drop-zone__input" accept="image/*">
            </div>
            <input type="text" id="newThumbnailUrl" placeholder="Or paste Thumbnail Image URL">

            <div class="modal-buttons">
                <button id="submitPublish" class="btn-publish">Publish</button>
                <button id="closeModal" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
